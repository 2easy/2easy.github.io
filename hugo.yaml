baseURL: "https://piotrolchawa.com"
title: "Data Consulting"
languageCode: en-us
DefaultContentLanguage: en
enableEmoji: true
enableGitInfo: true
enableRobotsTXT: true
canonifyURLs: true
paginate: 9
enableInlineShortcodes: true

params:
  author: Piotr Olchawa
  author_image: /images/defaults/author.jpg
  og_image: /images/defaults/featured_image.jpg
  moto: "Transforming data into insights, insights into action."
  description: "Data Engineering & Analytics made easy."
  google_analytics_id: "" # @NOTE: To remove the G2A tag, juste leave this key to an empty string.
  cta:
    text: Book a free consultation
    url: /contact
  footer:
    social_url: https://x.com/piotr_olchawa
    social_username: "@piotr_olchawa"

taxonomies:
  category: Categories
  tag: Tags

markup:
  goldmark:
    renderer:
      unsafe: true

module:
  hugoVersion:
    extended: true
    min: "0.110.0"
